<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code with Sachin | DOM </title>
</head>

<body style="background-color:black; color: white;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>
</body>
<script>

    // In this we do tree travsal everytime when ever we add a list
    function addLanguage(langName) {
        const li = document.createElement("li")
        li.innerHTML = `${langName}`
        document.querySelector(".language").appendChild(li);
    }
    addLanguage("pyhton")
    addLanguage("react")


    // In this we directly add a list don't need to do tree travesal
    function addOptimizeLanguage(langName) {
        const li = document.createElement("li")
        li.appendChild(document.createTextNode(langName))
        document.querySelector(".language").appendChild(li);
    }
    addOptimizeLanguage("Express JS")

    // Edit

    const secondLang = document.querySelector("li:nth-child(2)");
    // secondLang.innerHTML = "node js";

    const li = document.createElement("li")
    // li.textContent = "typescript"

    li.appendChild(document.createTextNode("HTML"))
    secondLang.replaceWith(li)

    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>Type Script </li>';


    // Remove
    const lastLang = document.querySelector("li:last-child")
    lastLang.remove()

</script>

</html>
